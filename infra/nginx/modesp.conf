# ModESP Cloud — Nginx Configuration
# Place in: /etc/nginx/sites-available/modesp
# Symlink:  ln -s /etc/nginx/sites-available/modesp /etc/nginx/sites-enabled/
# Also add to /etc/nginx/nginx.conf (http block):
#   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name modesp.com.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name modesp.com.ua;

    # ── TLS (Let's Encrypt) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/modesp.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/modesp.com.ua/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;

    # ── Security headers ───────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # ── REST API (reverse proxy to Node.js) ────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ── WebSocket ─────────────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Svelte WebUI (static files) ───────────────────────
    # Symlink: ln -s /opt/modesp-cloud/webui/dist /var/www/modesp/webui
    location / {
        root /var/www/modesp/webui;
        try_files $uri $uri/ /index.html;

        # Cache static assets (repeat security headers — Nginx drops parent
        # add_header directives when a nested block defines its own)
        location ~* \.(js|css|png|jpg|svg|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options DENY always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }
    }

    # ── Rate limiting ──────────────────────────────────────
    location /api/auth/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-limit device self-registration (bootstrap endpoint)
    location = /api/devices/register {
        limit_req zone=api burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
