# ModESP Cloud — Mosquitto ACL
# Place in: /etc/mosquitto/acl.conf
#
# Phase 1: Static ACL. Regenerate when adding devices.
# Phase 4+: Replace with mosquitto-go-auth + PostgreSQL backend.

# ── Backend (full access) ──────────────────────────────────
user modesp_backend
topic readwrite modesp/#

# ── Device template ────────────────────────────────────────
# Copy and customize per device. Replace {DEVICE_ID} and {TENANT}.
#
# Registered device (assigned to tenant):
# user device_{DEVICE_ID}
# topic write modesp/v1/{TENANT}/{DEVICE_ID}/state/#
# topic write modesp/v1/{TENANT}/{DEVICE_ID}/status
# topic write modesp/v1/{TENANT}/{DEVICE_ID}/heartbeat
# topic read  modesp/v1/{TENANT}/{DEVICE_ID}/cmd/#
#
# Pending device (not yet assigned):
# user device_{DEVICE_ID}
# topic write modesp/v1/pending/{DEVICE_ID}/state/#
# topic write modesp/v1/pending/{DEVICE_ID}/status
# topic write modesp/v1/pending/{DEVICE_ID}/heartbeat
# topic read  modesp/v1/pending/{DEVICE_ID}/cmd/#

# ── Example: device F27FCD (pending) ──────────────────────
user device_F27FCD
topic write modesp/v1/pending/F27FCD/state/#
topic write modesp/v1/pending/F27FCD/status
topic write modesp/v1/pending/F27FCD/heartbeat
topic read  modesp/v1/pending/F27FCD/cmd/#
# After assigning to tenant "acme":
topic write modesp/v1/acme/F27FCD/state/#
topic write modesp/v1/acme/F27FCD/status
topic write modesp/v1/acme/F27FCD/heartbeat
topic read  modesp/v1/acme/F27FCD/cmd/#
