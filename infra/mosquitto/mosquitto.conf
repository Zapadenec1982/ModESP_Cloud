# ModESP Cloud — Mosquitto Broker Configuration
# Place in: /etc/mosquitto/conf.d/modesp.conf

# ── Listeners ──────────────────────────────────────────────

# Internal (backend only, no auth required on localhost)
listener 1883 127.0.0.1
allow_anonymous true

# External (ESP32 devices, TLS + password auth)
listener 8883 0.0.0.0
allow_anonymous false
password_file /etc/mosquitto/passwd

# ── TLS (external listener) ────────────────────────────────
# Use Let's Encrypt certs (symlinked from certbot)
cafile /etc/mosquitto/certs/ca.crt
certfile /etc/mosquitto/certs/server.crt
keyfile /etc/mosquitto/certs/server.key
tls_version tlsv1.2

# ── ACL ────────────────────────────────────────────────────
acl_file /etc/mosquitto/acl.conf

# ── Persistence ────────────────────────────────────────────
persistence true
persistence_location /var/lib/mosquitto/
persistence_file mosquitto.db

# ── Logging ────────────────────────────────────────────────
log_dest syslog
log_type error
log_type warning
log_type notice
connection_messages true

# ── Limits ─────────────────────────────────────────────────
max_connections 200
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 1024
