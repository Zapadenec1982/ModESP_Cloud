# ═══════════════════════════════════════════════════════════
# ModESP Cloud — Mosquitto with mosquitto-go-auth
# Place in: /etc/mosquitto/conf.d/modesp.conf
# ═══════════════════════════════════════════════════════════

per_listener_settings true

# ── Listener 1: Backend (localhost, no auth) ──────────────
listener 1883 127.0.0.1
allow_anonymous true

# ── Listener 2: ESP32 devices (TLS + plugin auth) ────────
listener 8883 0.0.0.0
allow_anonymous false

# TLS (Let's Encrypt certs — copy fullchain.pem + privkey.pem to /etc/mosquitto/certs/)
certfile /etc/mosquitto/certs/server.crt
keyfile /etc/mosquitto/certs/server.key
tls_version tlsv1.2

# Auth plugin (mosquitto-go-auth with PostgreSQL)
auth_plugin /usr/lib/mosquitto/go-auth.so
auth_opt_backends postgres
auth_opt_hasher bcrypt
auth_opt_hasher_cost 12

# Cache (reduces DB queries)
auth_opt_cache true
auth_opt_cache_type go-cache
auth_opt_auth_cache_seconds 300
auth_opt_acl_cache_seconds 60
auth_opt_auth_jitter_seconds 10
auth_opt_acl_jitter_seconds 5

# PostgreSQL (read-only user)
auth_opt_pg_host localhost
auth_opt_pg_port 5432
auth_opt_pg_dbname modesp_cloud
auth_opt_pg_user modesp_mqtt_ro
auth_opt_pg_password CHANGE_ME_STRONG_RO_PASSWORD
auth_opt_pg_sslmode disable
auth_opt_pg_connect_tries 5

# ── SQL Queries ───────────────────────────────────────────

# User query: bcrypt hash by mqtt_username
auth_opt_pg_userquery SELECT mqtt_password_hash FROM devices WHERE mqtt_username = $1 AND status != 'disabled' AND mqtt_password_hash IS NOT NULL LIMIT 1

# Superuser: nobody (backend connects on localhost without plugin)
# Must accept $1 (username) parameter even though not used
auth_opt_pg_superquery SELECT COUNT(*) FROM devices WHERE mqtt_username = $1 AND 1 = 0

# ACL query: read/write separated via $2 (1=subscribe, 2=publish)
# Device can:
#   publish (2):   state/+, status, heartbeat
#   subscribe (1): cmd/+
auth_opt_pg_aclquery SELECT sub.prefix || acl.suffix FROM ( SELECT CASE WHEN d.status = 'pending' THEN 'modesp/v1/pending/' || d.mqtt_device_id WHEN d.status = 'active' THEN 'modesp/v1/' || t.slug || '/' || d.mqtt_device_id END AS prefix FROM devices d LEFT JOIN tenants t ON t.id = d.tenant_id WHERE d.mqtt_username = $1 AND d.status IN ('pending', 'active') ) sub CROSS JOIN ( SELECT '/state/+' AS suffix, 2 AS rw UNION ALL SELECT '/status', 2 UNION ALL SELECT '/heartbeat', 2 UNION ALL SELECT '/cmd/+', 1 ) acl WHERE acl.rw = $2 AND sub.prefix IS NOT NULL

# ── Persistence + Logging ─────────────────────────────────
persistence true
persistence_location /var/lib/mosquitto/
persistence_file mosquitto.db

# ── Logging ───────────────────────────────────────────────
log_dest syslog
log_type error
log_type warning
connection_messages true

# ── Limits ────────────────────────────────────────────────
max_connections 500
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 1024
